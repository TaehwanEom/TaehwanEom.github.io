<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtticLab — A small indie studio</title>
  <meta name="description" content="AtticLab is a small indie studio crafting focused productivity apps. Makers of ShutTimer and more.">
  <meta name="theme-color" content="#ff2424">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
      background: #f9f9fe;
      color: #1a1c1f;
      line-height: 1.6;
      padding: 48px 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    .brand {
      font-size: 40px;
      font-weight: 800;
      color: #1a1c1f;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    .tagline {
      font-size: 16px;
      color: #5d5e63;
      margin-bottom: 48px;
    }
    .intro {
      font-size: 15px;
      color: #1a1c1f;
      margin-bottom: 48px;
      padding: 0 10px;
    }
    .apps-section {
      margin-bottom: 48px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 800;
      color: #8e9099;
      letter-spacing: 2px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .app-card {
      background: #ffffff;
      border: 1px solid #e7e7ef;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      text-align: left;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.15s, border-color 0.15s;
    }
    .app-card:hover {
      transform: translateY(-2px);
      border-color: #ff2424;
    }
    .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .app-info { flex: 1; }
    .app-name {
      font-size: 17px;
      font-weight: 700;
      color: #1a1c1f;
      margin-bottom: 2px;
    }
    .app-desc {
      font-size: 13px;
      color: #5d5e63;
    }
    .app-arrow {
      font-size: 20px;
      color: #8e9099;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 40px;
    }
    .link-btn {
      display: inline-block;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      background: #ffffff;
      color: #5d5e63;
      border: 1px solid #e7e7ef;
      transition: border-color 0.15s, color 0.15s;
    }
    .link-btn:hover {
      border-color: #1a1c1f;
      color: #1a1c1f;
    }
    .footer {
      font-size: 12px;
      color: #8e9099;
      padding-top: 24px;
      border-top: 1px solid #e7e7ef;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="brand">AtticLab</h1>
    <p class="tagline">A small indie studio from the attic</p>

    <p class="intro">
      We craft quiet, focused productivity apps.
    </p>

    <section class="apps-section">
      <h2 class="section-title">Our Apps</h2>
      <a class="app-card" href="https://apps.apple.com/app/id6761991860">
        <img class="app-icon" src="/shuttimer-icon.png" alt="ShutTimer" width="52" height="52">
        <div class="app-info">
          <div class="app-name">ShutTimer</div>
          <div class="app-desc">Your Focus Timer</div>
        </div>
        <div class="app-arrow">→</div>
      </a>
    </section>

    <nav class="links">
      <a class="link-btn" href="/privacy">Privacy Policy</a>
      <a class="link-btn" href="mailto:hwan4870a@gmail.com">Contact</a>
    </nav>

    <footer class="footer">
      © 2026 AtticLab. All rights reserved.
    </footer>
  </main>
</body>
</html>
